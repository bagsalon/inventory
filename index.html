<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입고 체크리스트</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f5f5f5; color: #333; }
  .header { background: #1a1a1a; color: #fff; padding: 16px 20px; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .summary { font-size: 13px; color: #aaa; margin-top: 6px; }
  .header .summary span { color: #f0c040; font-weight: bold; }
  .progress-bar { height: 4px; background: #333; margin-top: 10px; border-radius: 2px; }
  .progress-fill { height: 100%; background: #2ecc71; border-radius: 2px; transition: width 0.3s; }
  .filters { padding: 10px 16px; background: #fff; border-bottom: 1px solid #eee; display: flex; gap: 8px; overflow-x: auto; }
  .filter-btn { padding: 6px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; background: #fff; cursor: pointer; white-space: nowrap; }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .list { padding: 8px 16px 100px; }
  .brand-group { margin-top: 12px; }
  .brand-label { font-size: 12px; font-weight: 700; color: #999; text-transform: uppercase; padding: 4px 0; letter-spacing: 0.5px; }
  .item { display: flex; align-items: center; background: #fff; border-radius: 10px; padding: 14px 16px; margin-top: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .item:active { transform: scale(0.98); }
  .item.checked { background: #f0faf0; }
  .item.checked .item-name { color: #999; text-decoration: line-through; }
  .check-circle { width: 28px; height: 28px; border: 2px solid #ddd; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-right: 14px; transition: all 0.2s; }
  .item.checked .check-circle { background: #2ecc71; border-color: #2ecc71; }
  .check-circle::after { content: ''; display: none; width: 6px; height: 10px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); margin-bottom: 2px; }
  .item.checked .check-circle::after { display: block; }
  .item-info { flex: 1; }
  .item-name { font-size: 15px; font-weight: 500; }
  .brand-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; color: #fff; margin-right: 6px; vertical-align: middle; }
  .brand-therow { background: #8e7cc3; }
  .brand-fendi { background: #d4a017; }
  .brand-lv { background: #6b4226; }
  .brand-bottega { background: #2e7d32; }
  .brand-goyard { background: #1565c0; }
  .brand-prada { background: #000; }
  .brand-chanel { background: #c62828; }
  .brand-margiela { background: #546e7a; }
  .item-status { font-size: 12px; color: #aaa; margin-top: 2px; }
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #eee; padding: 12px 20px; display: flex; gap: 10px; }
  .bottom-bar button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-reset { background: #f0f0f0; color: #666; }
  .btn-done { background: #1a1a1a; color: #fff; }
</style>
</head>
<body>

<div class="header">
  <h1>입고 체크리스트</h1>
  <div class="summary">
    <span id="checkedCount">0</span> / <span id="totalCount">0</span> 도착 완료
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="filters" id="filters"></div>
<div class="list" id="list"></div>

<div class="bottom-bar">
  <button class="btn-reset" onclick="resetAll()">초기화</button>
  <button class="btn-done" onclick="checkAll()">전체 도착</button>
</div>

<script>
const BRAND_CLASS = {
  '더로우': 'brand-therow', '펜디': 'brand-fendi', '루이비통': 'brand-lv',
  '보테가': 'brand-bottega', '고야드': 'brand-goyard', '프라다': 'brand-prada',
  '샤넬': 'brand-chanel', '마르지엘라': 'brand-margiela'
};

const STORAGE_KEY = 'handbag_checklist';
let currentFilter = '';

const DEFAULT_ITEMS = [
  ['더로우', '마고백'],
  ['더로우', '인디아백'],
  ['펜디', '맘마백'],
  ['펜디', '바게트백'],
  ['루이비통', '네버풀 모노그램'],
  ['루이비통', '반둘리에 25'],
  ['루이비통', '반둘리에 35'],
  ['루이비통', '올인 BB 모노그램'],
  ['보테가', '파라슈트백'],
  ['고야드', '하디백 블랙'],
  ['고야드', '하디백 콤비'],
  ['고야드', '보헴백 전 칼라'],
  ['고야드', '생루이 블랙 PM'],
  ['고야드', '생루이 블랙 GM'],
  ['고야드', '생루이 콤비 PM'],
  ['고야드', '생루이 콤비 GM'],
  ['고야드', '미니앙주 전 칼라'],
  ['고야드', '클러치 블랙 소'],
  ['고야드', '클러치 블랙 대'],
  ['고야드', '클러치 콤비 소'],
  ['고야드', '클러치 콤비 대'],
  ['프라다', '서류가방'],
  ['프라다', '리나일론 레더 백팩'],
  ['프라다', '소형 리나일론 백팩'],
  ['프라다', '보스톤 여행가방'],
  ['프라다', '리나일론 토트백'],
  ['프라다', '이서진 바이커 전 사이즈'],
  ['프라다', '테수토 체인스트랩'],
  ['프라다', '퀼팅 버킷백 베이지'],
  ['프라다', '버킷백'],
  ['프라다', '리나일론 사피아노 백팩'],
  ['프라다', '트래블 파우치'],
  ['샤넬', '26 제니백'],
  ['샤넬', '진주 미니백'],
  ['마르지엘라', '백팩'],
  ['마르지엘라', '체인백'],
  ['샤넬', '22백 스몰 블랙'],
  ['샤넬', '22백 스몰 화이트'],
  ['샤넬', '22 데님'],
  ['샤넬', '22백 미니 블랙메탈'],
  ['샤넬', '22백 미니'],
  ['샤넬', '22백 미니 블랙'],
  ['샤넬', 'WOC 전 색상'],
  ['샤넬', '25 미니체인'],
  ['샤넬', '26 스몰 쇼핑백'],
  ['샤넬', '볼링백'],
  ['샤넬', '체인 베니티'],
  ['루이비통', '신형 스티머 백팩'],
  ['루이비통', '델타 슬링백'],
  ['루이비통', '로우키 메신저'],
  ['루이비통', '로우키 베니티'],
  ['고야드', '미니보헴 전 색상'],
];

function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) return JSON.parse(saved);
  const items = DEFAULT_ITEMS.map(([brand, name]) => ({ brand, name, checked: false }));
  saveData(items);
  return items;
}

function saveData(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

function toggle(idx) {
  const items = loadData();
  items[idx].checked = !items[idx].checked;
  saveData(items);
  render();
}

function resetAll() {
  if (!confirm('전체 체크를 초기화할까요?')) return;
  const items = loadData();
  items.forEach(i => i.checked = false);
  saveData(items);
  render();
}

function checkAll() {
  const items = loadData();
  items.forEach(i => i.checked = true);
  saveData(items);
  render();
}

function setFilter(brand) {
  currentFilter = currentFilter === brand ? '' : brand;
  render();
}

function render() {
  const items = loadData();
  const brands = [...new Set(items.map(i => i.brand))];

  // Filters
  const filtersEl = document.getElementById('filters');
  filtersEl.innerHTML = `<div class="filter-btn ${currentFilter===''?'active':''}" onclick="setFilter('')">전체</div>` +
    brands.map(b => `<div class="filter-btn ${currentFilter===b?'active':''}" onclick="setFilter('${b}')">${b}</div>`).join('');

  // List grouped by brand
  const filtered = currentFilter ? items.filter(i => i.brand === currentFilter) : items;
  const grouped = {};
  filtered.forEach((item, fi) => {
    const idx = items.indexOf(item);
    if (!grouped[item.brand]) grouped[item.brand] = [];
    grouped[item.brand].push({ ...item, idx });
  });

  const listEl = document.getElementById('list');
  let html = '';
  for (const brand of Object.keys(grouped)) {
    const cls = BRAND_CLASS[brand] || '';
    html += `<div class="brand-group">`;
    html += `<div class="brand-label">${brand}</div>`;
    grouped[brand].forEach(item => {
      html += `<div class="item ${item.checked?'checked':''}" onclick="toggle(${item.idx})">
        <div class="check-circle"></div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-status">${item.checked ? '도착 완료' : '대기중'}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  listEl.innerHTML = html;

  // Summary
  const checked = items.filter(i => i.checked).length;
  document.getElementById('checkedCount').textContent = checked;
  document.getElementById('totalCount').textContent = items.length;
  document.getElementById('progressFill').style.width = (items.length ? (checked/items.length*100) : 0) + '%';
}

render();
</script>
</body>
</html>
